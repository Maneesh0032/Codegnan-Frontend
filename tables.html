<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables</title>
</head>
<body>

  <style>
    table{
      border: 1px solid black;
    }
    .hii{
      border: 1px solid black;
      background-color: red;
    }
    #hii{
      border: 1px solid grey;
      background-color:rgb(33,235,14);
    }
    #hiii{
      border: 1px solid grey;
      background-color:blue;
    }
  </style>
  <table border="1">
    <tr>
      <td class="hii">1</td>
      <td id="hii">1</td>
      <td id="hiii">1</td>
    </tr>
    <tr>
      <td id="hiii">2</td>
      <td class="hii">2</td>
      <td id="hii">2</td>
    </tr>
    <tr>
      <td id="hii">3</td>
      <td id="hiii">3</td>
      <td class="hii">3</td>
    </tr>
</body>
</html>
